apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yml
  - configmap.yml
  - secret.yml
  - postgres.yml
  - redis.yml
  - deployment.yml
  - service.yml
  - ingress.yml
  - hpa.yml

labels:
  - pairs:
      app.kubernetes.io/managed-by: kustomize
    includeSelectors: false
